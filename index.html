<!DOCTYPE html>
<html lang="en"> 
    <head> 
        <title>Puerto Rico | Junior Project by Jacob Borrero</title>
        <!-- Basic page setup for the browser -->
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <!-- Stylesheets and tab icon -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="css/styles.css"> 
        <link rel="icon" href="images/home/flag.png"> 
        <!-- JavaScript files that power the site -->
        <script src="javascript/picchange.js" defer></script> 
        <script src="javascript/spanish.js" defer></script> 
        <script src="javascript/sidebar.js" defer></script> 
        <script src="javascript/data.js" defer></script> 
        <script src="javascript/account.js" defer></script> 
        <script src="javascript/quiz.js" defer></script> 
        <script src="javascript/routing.js" defer></script> 
        <script src="javascript/suggestion.js" defer></script> 
        <script src="javascript/fade.js" defer></script>
        <script src="https://kit.fontawesome.com/4be9a25c93.js" crossorigin="anonymous"></script> 
        
    </head>    
    <body>
        <!-- Sidebar menu used for navigation on every page -->
        <div id="sidebar" class="sidebar-menu">
            <p id="menu">Menu</p>
            <a id="close" href="javascript:void(0)" onclick="closeSidebar()" aria-label="Close navigation menu">
                <i class="fa-solid fa-x"></i> Close
            </a>
            <a href="javascript:void(0)" onclick="showHome()" id="home" class="active-page" aria-current="page">
                <i class="fa fa-fw fa-home"></i> Home
            </a>
            <a href="javascript:void(0)" onclick="navigateToPage('history')" id="nav-history">
                <i class="fa fa-history"></i> History
            </a>
            <a href="javascript:void(0)" onclick="navigateToPage('music')" id="nav-music">
                <i class="fa fa-music"></i> Music
            </a>
            <a href="javascript:void(0)" onclick="navigateToPage('art')" id="nav-art">
                <i class="fa fa-palette"></i> Art
            </a>
            <a href="javascript:void(0)" onclick="navigateToPage('hurricane')" id="nav-hurricane">
                <i class="fa fa-cloud-showers-heavy"></i> Hurricane Maria
            </a>
            <a href="javascript:void(0)" onclick="navigateToPage('quiz')" id="nav-quiz">
                <i class="fa fa-pencil"></i> Quiz
            </a>
            <a href="javascript:void(0)" onclick="navigateToPage('account')" id="nav-account">
                <i class="fa fa-user"></i> Account
            </a>
        </div>

        <!-- Button that switches the site between English and Spanish -->
        <button class="language" onclick="changeLanguage()" id="languageBtn">
            Español
        </button>

        <!-- Main home page hero area shown above the cards -->
        <div class="hero-row">
            <img id="pic1" class="side-img" src="images/home/trumpetfacingright.png" alt="Left">
            <div class="jumbotron">
                <div class="wepa">Puerto Rico</div>
            </div>
            <img id="pic2" class="side-img" src="images/home/trumpetfacingleft.png" alt="Right">
        </div>

        <!-- Button that opens the sidebar menu -->
        <button class="sidebar" onclick="openSidebar()" aria-label="Open navigation menu">
            ☰
        </button>

        <!-- Home page cards that open the different sections -->
        <div class="page-grid">
            <div class="page-card" data-page="history" onclick="navigateToPage('history')">
                <img src="images/home/oldsanjuandoors.png" alt="History">
                <span id="historylabel">History</span>
            </div>
            <div class="page-card" data-page="music" onclick="navigateToPage('music')">
                <img src="images/home/music.png" alt="Music">
                <span id="musiclabel">Music</span>
            </div>
            <div class="page-card" data-page="art" onclick="navigateToPage('art')">
                <img src="images/home/art.png" alt="art">
                <span id="artlabel">Artists</span>
            </div>
            <div class="page-card" data-page="hurricane" onclick="navigateToPage('hurricane')">
                <img src="images/home/hurricane.png" alt="hurricane">
                <span id="hurricanelabel">Hurricane Maria</span>
            </div>
        </div>

        <!-- Hidden page sections that are shown by JavaScript when opened -->
        <!-- History -->
        <div id="history" class="page">
            <div class="hero-row">
                <img id="pic1history" class="side-img" src="images/history/coquifacingleftup.png" alt="Left">
                <div class="jumbotron">
                    <h1 class="wepa" id="history-title">History of Puerto Rico</h1>
                </div>
                <img id="pic2history" class="side-img" src="images/history/coquifacingrightup.png" alt="Right">
            </div>
            <div class="container">
                <div id="history-content" class="content-sections">
                </div>
            </div>
        </div>

        <!-- Music -->
        <div id="music" class="page">
            <div class="hero-row">
                <img id="pic1music" class="side-img" src="images/music/bongofacingleftup.png" alt="Left">
                <div class="jumbotron">
                    <h1 class="wepa" id="music-title">Puerto Rican Music</h1>
                </div>
                <img id="pic2music" class="side-img" src="images/music/bongofacingleftdown.png" alt="Right">
            </div>
            <div class="container">
                <div id="music-content" class="content-sections">
                </div>
            </div>
        </div>

        <!-- Art -->
        <div id="art" class="page">
            <div class="hero-row">
                <img id="pic1art" class="side-img" src="images/art/paintbrushfacingleftup.png" alt="Left">
                <div class="jumbotron">
                    <h1 class="wepa" id="art-title">Puerto Rican Art</h1>
                </div>
                <img id="pic2art" class="side-img" src="images/art/paintbrushfacingrightup.png" alt="Right">
            </div>
            <div class="container">
                <div id="art-content" class="content-sections">
                </div>
            </div>
        </div>

        <!-- Hurricane Maria -->
        <div id="hurricane" class="page">
            <div class="hero-row">
                <img class="side-img" src="images/hurricane/hurricaneleft.png" alt="Left">
                <div class="jumbotron">
                    <h1 class="wepa" id="hurricane-title">Hurricane Maria</h1>
                </div>
                <img class="side-img" src="images/hurricane/hurricaneright.png" alt="Right">
            </div>
            <div class="container">
                <div id="hurricane-content" class="content-sections">
                </div>
            </div>
        </div>

        <!-- Quiz -->
        <div id="quiz" class="page">
            <div class="hero-row">
                <img class="side-img" src="images/quiz/flagleft.png" alt="Left">
                <div class="jumbotron">
                    <h1 class="wepa" id="quiz-title">Puerto Rico Quiz</h1>
                </div>
                <img class="side-img" src="images/quiz/flagright.png" alt="Right">
            </div>
            <div class="container">
                <div id="quiz-content" class="quiz-container">
                </div>
            </div>
        </div>

        <!-- Account -->
        <div id="account" class="page">
            <div class="hero-row">
                <img class="side-img" src="images/quiz/flagleft.png" alt="Left">
                <div class="jumbotron">
                    <h1 class="wepa" id="account-title">Your <br> Account</h1>
                </div>
                <img class="side-img" src="images/quiz/flagright.png" alt="Right">
            </div>
            <div class="container">
                <div id="account-content" class="quiz-container">
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer id="footer">
            © 2026 Jacob Borrero. All rights reserved.
            <div class="social-links">
                <a href="mailto:jacob.borrero1@cttech.org" title="Email">
                    <i class="fa-solid fa-envelope"></i>
                </a>
                <a href="https://www.linkedin.com/in/jacob-borrero-ab4ba1368/" target="_blank" title="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
            </div>
        </footer>
    </body> 
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Jacob's Junior Project</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Bootstrap -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

        <!-- Favicon -->
        <link rel="icon" href="images/flag.png">

        <!-- Scripts -->
        <script src="javascript/picchangeindex.js" defer></script> 
        <script src="javascript/spanishindex.js" defer></script> 
        <script src="javascript/sidebar.js" defer></script> 
        <script src="javascript/routing.js" defer></script> 
        <script src="javascript/suggestionindex.js" defer></script> 
        <script src="javascript/fade.js" defer></script>
        <script src="https://kit.fontawesome.com/4be9a25c93.js" crossorigin="anonymous"></script> 

        <style>
            * {
                transition: all 0.25s ease;
            }

            body {
                margin: 0;
                font-family: 'Helvetica Neue';
                background: linear-gradient(#FCF6EA, #F3E9D2);
                color: #222;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .wepa {
                font-family: 'DTMFFont';
                padding: 1rem;
                font-size: 5rem;
                text-align: center;
                letter-spacing: 1px;
                color: #f7f7f7;
            }

            .jumbotron {
                background: #50C2F7;
                color: #f7f7f7;
                text-align: center;
                margin: 0 auto;
                max-width: 800px;
                padding: 60px;
            }

            img {
                max-width: 100%;
                height: auto;
                display: block;
            }

            button {
                position: relative;
                background: #FF6B6B;
                color: #FFD166;
                border: none;
                padding: 10px 18px;
                border-radius: 10px;
                cursor: pointer;
                font-family: 'DTMFFont';
                letter-spacing: 1.5px;
                box-shadow: 0 4px 12px #00000040;
            }

            button:hover {
                background: #f70000;
                color: #f7f7f7;
                transform: translateY(-2px);
            }

            .language {
                position: absolute;
                top: 20px;
                right: 20px;
            }

            .sidebar {
                position: absolute;
                top: 20px;
                left: 20px;
                font-weight: bold;
            }

            .sidebar-menu {
                position: fixed;
                left: -250px;
                top: 0;
                width: 250px;
                height: 100%;
                background: #FF6B6B;
                color: #FFD166;
                padding-top: 10px;
                transition: 0.3s;
                z-index: 1000;
            }

            .sidebar-menu a,
            .sidebar-menu p {
                display: block;
                padding: 15px 20px;
                font-family: 'DTMFFont';
                text-align: center;
            }

            .sidebar-menu a:hover {
                background: #f70000;
                color: #fff;
            }

            .sidebar-open {
                left: 0;
            }

            .hero-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                width: 100%;
                padding: 24px 0;
            }

            .side-img {
                width: 300px;
                max-width: 30vw;
                object-fit: contain;
                transition: transform 0.35s ease, opacity 0.35s ease;
                user-select: none;
            }

            .page-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 30px;
                padding: 20px;
                width: 80%;
                margin: 20px auto 0 auto;
            }

            .page-card {
                position: relative;
                height: 650px;
                border-radius: 14px;
                overflow: hidden;
                display: flex;
                align-items: flex-end;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 6px 18px #0B3C5D59;
                transition: 0.25s;
            }

            .page-card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .page-card span {
                width: 100%;
                background: #FF6B6B;
                color: #FFD166;
                font-size: 30px;
                padding: 10px;
                position: absolute;
                bottom: 0;
                text-align: center;
                font-weight: bold;
            }

            .page-card:hover {
                transform: translateY(-8px) scale(1.03);
                box-shadow: 0 18px 40px #0B3C5D59;
            }

            /* Suggest Section */
            .suggest-section {
                width: 80%;
                margin: 40px auto;
            }

            .suggest-card {
                background: #0B3C5D;
                border-radius: 14px;
                box-shadow: 0 8px 24px #0b3c5d59;
                overflow: hidden;
                color: #f7f7f7;
            }

            .suggest-header {
                background: #FF6B6B;
                color: #FFD166;
                padding: 10px;
                text-align: center;
                font-family: 'DTMFFont';
                letter-spacing: 2px;
                font-size: 1.6rem;
            }

            footer {
                background: #50C2F7;
                padding: 1.5rem;
                text-align: center;
                font-family: 'DTMFFont';
                color: #f7f7f7;
            }

            @font-face {
                font-family: 'DTMFFont';
                src: url('fonts/DtMF.ttf') format('truetype');
            }

            @media (max-width: 700px) {
                .hero-row {
                    flex-direction: column;
                    padding: 12px;
                }

                .side-img {
                    width: 120px;
                }

                .page-card {
                    height: 320px;
                }
            }
        </style>
    </head>

    <body>

        <!-- Sidebar -->
        <div id="sidebar" class="sidebar-menu">
            <p id="menu">Menu</p>
            <a id="close" href="javascript:void(0)" onclick="closeSidebar()">✕ Close</a>
            <a href="index.html"><i class="fa fa-fw fa-home"></i> Home</a>
            <a href="map.html"><i class="fa fa-map"></i> Map</a>
            <a href="quiz.html"><i class="fa fa-pencil"></i> Quiz</a>
            <a href="achievements.html"><i class="fa fa-trophy"></i> Achievements</a>
            <a href="account.html"><i class="fa-solid fa-circle-user"></i> Account</a>
        </div>

        <!-- Language Button -->
        <button class="language" onclick="changeLanguage()" id="languageBtn">
            Español
        </button>

        <!-- Hero Section -->
        <div class="hero-row">
            <img id="pic1" class="side-img" src="images/trumpetfacingright.png" alt="Trumpet facing right">
            <div class="jumbotron">
                <div class="wepa">Puerto Rico</div>
            </div>
            <img id="pic2" class="side-img" src="images/trumpetfacingleft.png" alt="Trumpet facing left">
        </div>

        <!-- Sidebar Toggle -->
        <button class="sidebar" onclick="openSidebar()">☰</button>

        <!-- Grid of Pages -->
        <div class="page-grid">
            <div class="page-card" data-page="history.html">
                <img src="images/oldsanjuandoors.png" alt="History">
                <span>History</span>
            </div>

            <div class="page-card" data-page="music.html">
                <img src="images/music.png" alt="Music">
                <span>Music</span>
            </div>

            <div class="page-card" data-page="holidays.html">
                <img src="images/holidays.png" alt="Holidays">
                <span>Holidays</span>
            </div>

            <div class="page-card" data-page="hurricane.html">
                <img src="images/hurricane.png" alt="Hurricane Maria">
                <span>Hurricane Maria</span>
            </div>

            <div class="page-card" data-page="art.html">
                <img src="images/art.png" alt="Art">
                <span>Art</span>
            </div>
        </div>

        <!-- Suggestion Section -->
        <section class="suggest-section">
            <div class="suggest-card" id="suggestCard">

                <div class="suggest-header" id="suggestionTitle">
                    Suggest an Addition
                </div>

                <div class="suggest-body">
                    <form id="suggestionForm" novalidate>
                        <label for="name" class="suggest-label">Your Name</label>
                        <input id="name" class="suggest-input" type="text" required>

                        <label for="suggestion" class="suggest-label">Addition Suggestion</label>
                        <input id="suggestion" class="suggest-input" type="text" required>

                        <label for="comments" class="suggest-label">Additional Comments</label>
                        <input id="comments" class="suggest-input" type="text">

                        <div class="suggest-actions">
                            <button id="submitBtn" type="submit" class="btn-primary-site">Submit Suggestion</button>
                            <button id="clearBtn" type="reset" class="btn-primary-site">Clear</button>
                        </div>
                    </form>
                </div>

            </div>
        </section>

        <!-- Footer -->
        <footer>
            © 2026 Jacob Borrero. All rights reserved.
            <div class="social-links">
                <a href="mailto:jacob.borrero1@cttech.org" title="Email">
                    <i class="fa-solid fa-envelope"></i>
                </a>
                <a href="https://www.linkedin.com/in/jacob-borrero-ab4ba1368/" target="_blank" title="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
            </div>
        </footer>

    </body>
</html>
